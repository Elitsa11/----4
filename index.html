<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HERO SYSTEM</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="hero-panel">
    <h1>ГЕРОЙСКА СИЛА</h1>

    <div class="hero-icon">⚡</div>

    <div class="energy-panel">
      <div class="energy-label">ЕНЕРГИЯ</div>
      <div class="energy-meter">
        <div id="energyBar" class="energy-bar"></div>
      </div>
      <div id="energyValue" class="energy-value">120 / 120</div>
    </div>

    <div class="boss-panel">
      <div class="boss-header">
        <div class="boss-name">БОС: Ледения Властелин</div>
        <div id="bossValue" class="boss-value">150 / 150</div>
      </div>
      <div class="boss-meter">
        <div id="bossBar" class="boss-bar"></div>
      </div>
    </div>

    <div class="abilities">
      <button id="shieldBtn" class="ability-btn" data-cost="20">Щитова Вълна<br><span>20 енергия</span></button>
      <button id="strikeBtn" class="ability-btn" data-cost="35">Удар на Светлината<br><span>35 енергия</span></button>
      <button id="surgeBtn" class="ability-btn" data-cost="50">Пулс на Възстановяване<br><span>възстановява 50</span></button>
      <button id="frostBtn" class="ability-btn" data-cost="25">Ледена Стена<br><span>25 енергия</span></button>
      <button id="meteorBtn" class="ability-btn" data-cost="45">Метеоритен Удар<br><span>45 енергия</span></button>
    </div>

    <div id="statusText" class="status-text">Готов за битка. Натисни способност.</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
